  <desc id="desc">Rounded square icon with Arabic text for the Hifz vocabulary app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f2e8" />
      <stop offset="100%" stop-color="#ece8d7" />
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)" />
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="#d8cfb0" stroke-width="10" />
  <text
